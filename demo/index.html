<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vue-form-list Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 40px; color: #333; }
    h1 { margin-bottom: 24px; font-size: 24px; }
    #app { max-width: 600px; margin: 0 auto; }
    .form-list fieldset { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
    .form-list legend { font-weight: 600; font-size: 16px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
    .fls-field { margin-bottom: 16px; }
    .fls-field label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 14px; }
    .fls-field input, .fls-field select { width: 100%; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    .fls-field input:focus, .fls-field select:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
    .fls-field input[required] { border-left: 3px solid #e74c3c; }
    .fls-description { color: #888; font-size: 12px; margin-top: 4px; }
    .fls-error { color: #e74c3c; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
